<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esquiva los Bloques</title>

<style>

body{
    margin:0;
    background:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    font-family:Arial,sans-serif;
    padding-bottom:80px;
}

#score{
    color:white;
    font-size:24px;
    font-weight:bold;
    margin:15px 0;
}

canvas{
    background:#000;
    border:3px solid cyan;
    box-shadow:0 0 20px cyan;
}

#controles{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:15px;
}

#controles button{
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    font-size:28px;
    cursor:pointer;
}

#anuncio{
    position:fixed;
    bottom:0;
    left:0;

    width:100%;
    height:70px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(20,20,20,0.95);
    border-top:1px solid rgba(0,255,255,.4);

    color:white;
    z-index:999;
}

#menuFinal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:none;
    gap:15px;
}

#menuFinal button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:cyan;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>
<body>

<div id="score">Puntos: 0</div>

<canvas id="game"></canvas>

<div id="controles">
    <button id="izquierda">⬅️</button>
    <button id="derecha">➡️</button>
</div>

<div id="anuncio">
    📢 Espacio publicitario
</div>

<div id="menuFinal">
    <button onclick="reiniciarJuego()">🔄 Reiniciar</button>

    <button onclick="window.location.href='index.html'">
        🏠 Inicio
    </button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){

    if(window.innerWidth <= 768){

        canvas.width = 350;
        canvas.height = 500;

    }else{

        canvas.width = 600;
        canvas.height = 700;

    }

}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

const scoreText = document.getElementById("score");

let score = 0;
let gameOver = false;

const player = {
    x:0,
    y:0,
    width:40,
    height:40,
    speed:12
};

function resetPlayer(){

    player.x = canvas.width/2 - player.width/2;
    player.y = canvas.height - 60;

}

resetPlayer();

const enemies = [];
const keys = {};

document.addEventListener("keydown",(e)=>{
    keys[e.key] = true;
});

document.addEventListener("keyup",(e)=>{
    keys[e.key] = false;
});

function createEnemy(){

    enemies.push({
        x:Math.random()*(canvas.width-40),
        y:-40,
        width:40,
        height:40,
        speed:4 + Math.random()*3
    });

}

setInterval(()=>{

    if(!gameOver){
        createEnemy();
    }

},800);

function update(){

    if(keys["ArrowLeft"] || keys["a"]){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"] || keys["d"]){
        player.x += player.speed;
    }

    if(player.x < 0){
        player.x = 0;
    }

    if(player.x > canvas.width - player.width){
        player.x = canvas.width - player.width;
    }

    enemies.forEach((enemy,index)=>{

        enemy.y += enemy.speed;

        if(enemy.y > canvas.height){

            enemies.splice(index,1);

            score++;

            scoreText.textContent =
            "Puntos: " + score;
        }

        if(
            player.x < enemy.x + enemy.width &&
            player.x + player.width > enemy.x &&
            player.y < enemy.y + enemy.height &&
            player.y + player.height > enemy.y
        ){

            gameOver = true;

            document.getElementById("menuFinal")
            .style.display = "flex";
        }

    });

}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "cyan";

    ctx.fillRect(
        player.x,
        player.y,
        player.width,
        player.height
    );

    ctx.fillStyle = "red";

    enemies.forEach(enemy=>{

        ctx.fillRect(
            enemy.x,
            enemy.y,
            enemy.width,
            enemy.height
        );

    });

    if(gameOver){

        ctx.fillStyle = "white";
        ctx.textAlign = "center";

        ctx.font = "35px Arial";

        ctx.fillText(
            "GAME OVER",
            canvas.width/2,
            canvas.height/2
        );

        ctx.font = "24px Arial";

        ctx.fillText(
            "Puntos: " + score,
            canvas.width/2,
            canvas.height/2 + 40
        );

    }

}

function reiniciarJuego(){

    score = 0;
    gameOver = false;

    enemies.length = 0;

    resetPlayer();

    scoreText.textContent = "Puntos: 0";

    document.getElementById("menuFinal")
    .style.display = "none";
}

function loop(){

    if(!gameOver){
        update();
    }

    draw();

    requestAnimationFrame(loop);
}

const btnIzq = document.getElementById("izquierda");
const btnDer = document.getElementById("derecha");

btnIzq.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    keys["ArrowLeft"] = true;
});

btnIzq.addEventListener("touchend",(e)=>{
    e.preventDefault();
    keys["ArrowLeft"] = false;
});

btnIzq.addEventListener("touchcancel",()=>{
    keys["ArrowLeft"] = false;
});

btnDer.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    keys["ArrowRight"] = true;
});

btnDer.addEventListener("touchend",(e)=>{
    e.preventDefault();
    keys["ArrowRight"] = false;
});

btnDer.addEventListener("touchcancel",()=>{
    keys["ArrowRight"] = false;
});

loop();

</script>

</body>
</html>
