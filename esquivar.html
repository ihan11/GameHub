<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esquiva los Bloques</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

canvas{
    background:#000;
    border:3px solid cyan;
}

#score{
    position:absolute;
    top:20px;
    color:white;
    font-size:24px;
}
#menuFinal{
    position:absolute;
    top:60%;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:15px;
}

#menuFinal button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:cyan;
    color:black;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

#menuFinal button:hover{
    transform:scale(1.05);
}

#controles{
    position:absolute;
    bottom:20px;
    display:none;
    gap:20px;
}

#controles button{
    width:80px;
    height:80px;
    border:none;
    border-radius:50%;
    font-size:30px;
}

@media(max-width:768px){
    #controles{
        display:flex;
    }
}
</style>
</head>
<body>

<div id="score">Puntos: 0</div>

<canvas id="game" width="600" height="700"></canvas>

<div id="controles">
    <button id="izquierda">⬅️</button>
    <button id="derecha">➡️</button>
</div>

<div id="menuFinal" style="display:none;">
    <button onclick="reiniciarJuego()">🔄 Reiniciar</button>

    <button onclick="window.location.href='index.html'">
        🏠 Volver al Inicio
    </button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("score");

let score = 0;
let gameOver = false;

const player = {
    x: 270,
    y: 620,
    width: 60,
    height: 60,
    speed: 8
};

const enemies = [];
const keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

function createEnemy(){
    enemies.push({
        x: Math.random() * 550,
        y: -50,
        width: 50,
        height: 50,
        speed: 3 + Math.random() * 4
    });
}

setInterval(() => {
    if(!gameOver){
        createEnemy();
    }
}, 800);

function update(){

    if(keys["ArrowLeft"] || keys["a"]){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"] || keys["d"]){
        player.x += player.speed;
    }

    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width - player.width){
        player.x = canvas.width - player.width;
    }

    enemies.forEach((enemy,index)=>{

        enemy.y += enemy.speed;

        if(enemy.y > canvas.height){
            enemies.splice(index,1);
            score++;
            scoreText.textContent = "Puntos: " + score;
        }

        if(
           player.x < enemy.x + enemy.width &&
           player.x + player.width > enemy.x &&
           player.y < enemy.y + enemy.height &&
           player.y + player.height > enemy.y
        ){
    gameOver = true;

    document.getElementById("menuFinal").style.display = "flex";
}

    });

}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "cyan";
    ctx.fillRect(
        player.x,
        player.y,
        player.width,
        player.height
    );

    ctx.fillStyle = "red";

    enemies.forEach(enemy=>{
        ctx.fillRect(
            enemy.x,
            enemy.y,
            enemy.width,
            enemy.height
        );
    });

    if(gameOver){

        ctx.fillStyle = "white";
        ctx.font = "50px Arial";
        ctx.textAlign = "center";

        ctx.fillText(
            "GAME OVER",
            canvas.width/2,
            canvas.height/2
        );

        ctx.font = "30px Arial";
        ctx.fillText(
            "Puntos: " + score,
            canvas.width/2,
            canvas.height/2 + 50
        );
    }

}

function reiniciarJuego(){

    score = 0;
    gameOver = false;

    player.x = 270;
    player.y = 620;

    enemies.length = 0;

    scoreText.textContent = "Puntos: 0";

    document.getElementById("menuFinal").style.display = "none";
}

function loop(){

    if(!gameOver){
        update();
    }

    draw();
    requestAnimationFrame(loop);
}

document.getElementById("izquierda").addEventListener("touchstart",()=>{
    keys["ArrowLeft"]=true;
});

document.getElementById("izquierda").addEventListener("touchend",()=>{
    keys["ArrowLeft"]=false;
});

document.getElementById("derecha").addEventListener("touchstart",()=>{
    keys["ArrowRight"]=true;
});

document.getElementById("derecha").addEventListener("touchend",()=>{
    keys["ArrowRight"]=false;
});

loop();
</script>

</body>
</html>
