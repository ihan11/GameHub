<!DOCTYPE html>
<html lang="es">
<head>

<title>GameHub</title>
<link rel="stylesheet" href="fondo.css">

<body>

<button id="toggleSidebar" class="toggle-btn">☰</button>

<div class="sidebar">
    <h2>🎮 GameHub</h2>

    <input type="text" placeholder="Buscar juego..." id="buscador">

    <ul>
     <li><a href="#">🆕 Nuevos</a></li>
     <li><a href="info.html">ℹ️ Sobre</a></li>
    </ul>
</div>

<div class="contenido">
    <h1>Bienvenido a GameHub</h1>
    <p>Tu destino para mini juegos rápidos y divertidos.</p>

    <div class="grid">

        <div class="juego">
            <img src="imagenes/esquivar.png">

            <p>Sobrevive el mayor tiempo posible.</p>
            <button onclick="window.location.href='esquivar.html'">

            </button>
        </div>

        <div class="juego">
            <img src="imagenes/CLICK RUSH.png">
            <h3>CLICK RUSH</h3>
            <p>Carreras extremas.</p>

    <div class="anuncios-horizontal">
        <p>Espacio publicitario</p>
    </div>

</div>

<footer>

<script>
const btn = document.querySelector(".toggle-btn");
const sidebar = document.querySelector(".sidebar");

btn.addEventListener("click", () => {
    sidebar.classList.toggle("oculto");
    document.body.classList.toggle("sidebar-oculta");
});
</script>
